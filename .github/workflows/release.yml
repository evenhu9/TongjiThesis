            **Compiled Examples** (preview final output):
            - `example-linux-xelatex.pdf` / `example-linux-lualatex.pdf`
            - `example-macos-xelatex.pdf` / `example-macos-lualatex.pdf`
            - `example-windows-xelatex.pdf` / `example-windows-lualatex.pdf`

